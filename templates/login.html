<!-- Standards mode keeps the public authentication screen rendering predictably across browsers. -->
<!DOCTYPE html>
<html lang="en">
<!-- Metadata and shared styling keep the sign-in and sign-up experience usable across device sizes. -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AcciVision</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<!-- The login page intentionally stays outside the dashboard shell to separate public access from protected operations. -->
<body>

<!-- =========================
     1. Authentication Card
     ========================= -->
<div class="auth-page">
  <div class="auth-box fade-in">

    <div class="auth-brand">
      <div class="brand-icon">⚡</div>
      <div>
        <div class="brand-name">AcciVision</div>
        <div class="brand-sub">Traffic AI System</div>
      </div>
    </div>

    {% if error %}
    <div class="msg msg-error show">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="msg msg-success show">{{ success }}</div>
    {% endif %}

    <div id="loginForm" class="auth-form-wrap">
      <h2>Welcome Back</h2>
      <p class="auth-subtitle">Sign in to access the detection system</p>

      <form method="POST" action="{{ url_for('login') }}">
        <input type="hidden" name="form_type" value="login">
        <div class="form-group">
          <label for="login_email">Email</label>
          <input type="email" id="login_email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="login_password">Password</label>
          <input type="password" id="login_password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">Sign In</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="{{ url_for('select_role') }}">Sign Up</a></p>
    </div>

    <!-- =========================
         2. Role-Based Registration Form
         ========================= -->
    <div id="signupForm" class="auth-form-wrap hidden">
      <h2>Create Account</h2>
      <p class="auth-subtitle">Register to start using AcciVision</p>

      <form method="POST" action="{{ url_for('login') }}">
        <input type="hidden" name="form_type" value="signup">
        <div class="form-group">
          <label for="signup_email">Email</label>
          <input type="email" id="signup_email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="signup_password">Password</label>
          <input type="password" id="signup_password" name="password" placeholder="Create a password" required>
        </div>
        <div class="form-group">
          <label for="signup_confirm">Confirm Password</label>
          <input type="password" id="signup_confirm" name="confirm_password" placeholder="Confirm your password" required>
        </div>
        <input type="hidden" name="role" value="{{ selected_role }}">
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">Create Account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="#" onclick="toggleForm('login')">Sign In</a></p>
    </div>

  </div>
</div>

<!-- =========================
     3. Role-Based Redirect Logic
     ========================= -->
<!-- Lightweight client behavior improves the authentication flow without moving trust decisions out of the backend. -->
<script>
function toggleForm(f) {
  document.getElementById('loginForm').classList.toggle('hidden', f === 'signup');
  document.getElementById('signupForm').classList.toggle('hidden', f !== 'signup');
}
{% if show_signup %} toggleForm('signup'); {% endif %}
</script>
</body>
</html>
